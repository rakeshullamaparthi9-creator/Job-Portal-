<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Jobs - JobPortal</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <a href="index.html" class="nav-logo">💼 <span>Job</span>Portal</a>
        <div class="nav-links">
            <span style="color:var(--gray)">🏢 <span id="user-name"></span></span>
            <button onclick="logout()" class="btn btn-outline btn-sm">Logout</button>
        </div>
    </div>
</nav>

<div class="dashboard-layout" id="employer-dash">
    <aside class="sidebar">
        <nav class="sidebar-nav">
            <a href="dashboard-employer.html"><span class="icon">📊</span> Dashboard</a>
            <a href="post-job.html"><span class="icon">➕</span> Post a Job</a>
            <a href="manage-jobs.html" class="active"><span class="icon">📋</span> Manage Jobs</a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <h1>Manage Jobs</h1>
            <p>View applicants and control your job listings</p>
        </div>

        <div class="card">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
                <h3>All Job Postings</h3>
                <a href="post-job.html" class="btn btn-primary btn-sm">➕ Post New Job</a>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Job Title</th>
                            <th>Location</th>
                            <th>Status</th>
                            <th>Applicants</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="jobs-table"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<!-- Applicants Modal -->
<div class="modal-overlay" id="job-modal">
    <div class="modal" style="max-width:800px">
        <button class="modal-close" onclick="closeModal('job-modal')">&times;</button>
        <div id="modal-body"></div>
    </div>
</div>

<script src="js/main.js"></script>
</body>
</html>
