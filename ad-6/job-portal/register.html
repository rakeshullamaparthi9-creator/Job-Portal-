<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - JobPortal</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <h2>Create Account</h2>
        <p>Join JobPortal as a job seeker or employer</p>

        <div id="reg-alert" class="alert"></div>

        <div class="role-toggle">
            <button class="role-btn active" data-role="seeker">👤 Job Seeker</button>
            <button class="role-btn" data-role="employer">🏢 Employer</button>
        </div>
        <input type="hidden" id="role-input" value="seeker">

        <form id="register-form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="fullname" class="form-control" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Min 6 chars" required minlength="6">
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" name="confirm" class="form-control" placeholder="Repeat password" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg">Create Account</button>
        </form>

        <p style="text-align:center;margin-top:1.5rem;color:var(--gray)">
            Already have an account? <a href="login.html" style="color:var(--primary);font-weight:600">Sign In</a>
        </p>
    </div>
</div>
<script src="js/main.js"></script>
</body>
</html>
