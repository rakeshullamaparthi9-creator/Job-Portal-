<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - JobPortal</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <h2>Welcome back</h2>
        <p>Sign in to your JobPortal account</p>

        <div id="login-alert" class="alert"></div>

        <form id="login-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" name="email" id="email" class="form-control" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg">Sign In</button>
        </form>

        <p style="text-align:center;margin-top:1.5rem;color:var(--gray)">
            Don't have an account? <a href="register.html" style="color:var(--primary);font-weight:600">Register</a>
        </p>
        <p style="text-align:center;margin-top:.5rem">
            <a href="index.html" style="color:var(--gray);font-size:.9rem">← Back to Home</a>
        </p>
    </div>
</div>
<script src="js/main.js"></script>
</body>
</html>
